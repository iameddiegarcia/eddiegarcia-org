<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Eddie Garcia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #7C3AED;
      --pink: #EC4899;
      --dark: #0F0A1A;
      --card-bg: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.08);
      --text: rgba(255,255,255,0.88);
      --muted: rgba(255,255,255,0.45);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% -10%, rgba(124,58,237,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 110%, rgba(236,72,153,0.18) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(12px);
      background: rgba(15,10,26,0.7);
      border-bottom: 1px solid var(--card-border);
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(90deg, #fff 0%, var(--pink) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }

    .nav-links { display: flex; gap: 32px; list-style: none; }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }

    .nav-links a:hover, .nav-links a.active { color: #fff; }

    /* ── Video Hero ── */
    .video-hero {
      position: relative;
      height: 70vh;
      overflow: hidden;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: rgba(15,10,26,0.6);
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 80px 40px 40px;
      text-align: center;
      max-width: 700px;
      margin: 0 auto;
    }

    .hero-label {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--pink);
      margin-bottom: 20px;
    }

    .hero-content h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #fff 30%, var(--pink) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-content p {
      font-size: 17px;
      color: var(--muted);
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── Form Section ── */
    .form-section {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 80px 40px 120px;
    }

    .contact-form {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 48px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: rgba(255,255,255,0.2);
    }

    .form-group textarea {
      min-height: 160px;
      resize: vertical;
    }

    .submit-btn {
      display: block;
      width: 100%;
      padding: 16px 32px;
      border-radius: 100px;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(124,58,237,0.35);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .form-status {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
      min-height: 24px;
    }

    .form-status.success { color: #34D399; }
    .form-status.error { color: #F87171; }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px;
      border-top: 1px solid var(--card-border);
      color: var(--muted);
      font-size: 13px;
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--pink); }

    @media (max-width: 640px) {
      nav { padding: 16px 20px; }
      .nav-links { gap: 16px; }
      .hero-content { padding: 100px 20px 40px; }
      .form-section { padding: 48px 20px 80px; }
      .contact-form { padding: 28px 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">Eddie Garcia</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/tools/">Tools</a></li>
      <li><a href="/connect/">Connect</a></li>
      <li><a href="/contact/" class="active">Contact</a></li>
    </ul>
  </nav>

  <section class="video-hero">
    <canvas id="page-video-hero" data-frames="contact" data-count="121" style="position:absolute;inset:0;width:100%;height:100%;z-index:0;"></canvas>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <span class="hero-label">Get in Touch</span>
      <h1>Send a Message</h1>
      <p>Have a question, an idea, or want to collaborate? Drop a line.</p>
    </div>
  </section>

  <div class="form-section">
    <form class="contact-form" id="contactForm">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" placeholder="What's this about?">
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Tell me what you're thinking..." required></textarea>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Send Message</button>
      <div class="form-status" id="formStatus"></div>
    </form>
  </div>

  <footer>
    <p><a href="/">&#8592; Back to eddiegarcia.org</a> &nbsp;&middot;&nbsp; Built with Claude &amp; Codex &nbsp;&middot;&nbsp; Deployed on Vercel</p>
  </footer>

  <script src="../page-video-hero.js"></script>
  <script>
    const form = document.getElementById('contactForm');
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('formStatus');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Sending...';
      status.textContent = '';
      status.className = 'form-status';

      const data = {
        name: form.name.value,
        email: form.email.value,
        subject: form.subject.value,
        message: form.message.value,
      };

      try {
        const res = await fetch('/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        if (res.ok) {
          status.textContent = 'Message sent. Thank you!';
          status.className = 'form-status success';
          form.reset();
        } else {
          throw new Error('Failed to send');
        }
      } catch (err) {
        status.textContent = 'Something went wrong. Try emailing info@eddiegarcia.org directly.';
        status.className = 'form-status error';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Message';
      }
    });
  </script>

</body>
</html>
